name: Dependency Update

on:
  schedule:
    # Runs every Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    name: Update dependencies
    runs-on: ubuntu-latest
    steps:
      - name: GitHub App token
        id: github_app_token
        uses: tibdex/github-app-token@v2.1.0
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.github_app_token.outputs.token }}

      - id: install-dashboards
        uses: derek-ho/setup-opensearch-dashboards@v3
        with:
          plugin_name: security-dashboards-plugin

      - name: Run yarn upgrade
        run: yarn upgrade --non-interactive
        working-directory: ${{ steps.install-dashboards.outputs.plugin-directory }}

      - name: Check for changes
        id: changes
        run: |
          cd ${{ steps.install-dashboards.outputs.plugin-directory }}
          if git diff --quiet package.json yarn.lock; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.github_app_token.outputs.token }}
          path: ${{ steps.install-dashboards.outputs.plugin-directory }}
          commit-message: "chore: automated dependency update"
          committer: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          signoff: true
          branch: automated-dependency-update
          delete-branch: true
          title: "[Maintenance] Automated dependency update"
          body: |
            This PR was automatically generated by the dependency update workflow.

            Updates `package.json` and `yarn.lock` via `yarn upgrade`.

            Please review the changes and ensure CI passes before merging.
          labels: |
            dependencies
            maintenance
