name: Unit Tests

on: [ push, pull_request ]

jobs:
  unit-tests:
    name: Run unit tests
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest , windows-latest ]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Enable longer filenames
        if: ${{ matrix.os == 'windows-latest' }}
        run: git config --system core.longpaths true

      - name: Checkout Branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - id: install-dashboards
        uses: opensearch-project/opensearch-build/.github/actions/setup-opensearch-dashboards@60ee66886359c2ed4f5b47230593f08f8b17ce3e
        with:
           plugin_name: security-dashboards-plugin

      - name: Run lint
        run: yarn lint
        working-directory: ${{ steps.install-dashboards.outputs.plugin-directory }}

      - name: Run unit test
        run: yarn test:jest_ui --coverage
        working-directory: ${{ steps.install-dashboards.outputs.plugin-directory }}

      - name: Uploads coverage
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
