name: Unit Tests

on: [ push, pull_request ]

jobs:
  unit-tests:
    name: Run unit tests
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest , windows-latest ]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Enable longer filenames
        if: ${{ matrix.os == 'windows-latest' }}
        run: git config --system core.longpaths true

      - name: Checkout Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - id: install-dashboards
        uses: opensearch-project/opensearch-build/.github/actions/setup-opensearch-dashboards@72a7a8a167ed06d83ba65b4d9f60acd08232cd56
        with:
           plugin_name: security-dashboards-plugin

      - name: Run lint
        run: yarn lint
        working-directory: ${{ steps.install-dashboards.outputs.plugin-directory }}

      - name: Run unit test
        run: yarn test:jest_ui --coverage
        working-directory: ${{ steps.install-dashboards.outputs.plugin-directory }}

      - name: Uploads coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
